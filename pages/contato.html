<!DOCTYPE html>
<html lang="PT-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TripWay | Contato</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins" rel="stylesheet">
</head>
<body style="font-family: Poppins;">

    <nav>
     <a href="../index.html">
      <h2>TripWay</h2>
     </a>

     <ul>
        <li><a href="../index.html">Home</a></li>
        <li><a href="destinos.html">Destinos</a></li>
        <li><a href="pacotes.html">Pacotes</a></li>
        <li><a href="contato.html">Contato</a></li>
     </ul>
    </nav>

    <main>
        <section>

            <h1>Entre em contato</h1>
            <img src="../images/banner-contato.png" 
            alt="Pessoa planejando viagem" 
            style="width:100%; max-width:800px;">
            <p>Preencha os dados para montar sua viagem ideal.</p>

            <form>
                <div>
                    <label for="nome">Nome</label><br>
                    <input type="text" id="nome" placeholder="Seu nome" required>
                </div>
                
                <br>

                <div>
                    <label for="email">E-mail</label><br>
                    <input type="email" id="email" placeholder="seu@email.com" required>
                </div>

                <br>

                <div>
                    <label for="destino">Destino de interesse</label><br>

                    <select id="destino" required>
                        <option value="">Selecione um destino</option>

                        <option disabled>Destinos Nacionais:</option>
                        <option>Belém</option>
                        <option>Fortaleza</option>
                        <option>Manaus</option>
                        <option>Brasília</option>
                        <option>Recife</option>
                        <option>Belo Horizonte</option>
                        <option>Salvador</option>
                        <option>Curitiba</option>
                        <option>Rio de Janeiro</option>
                        <option>Porto Alegre</option>
                        <option>São Paulo</option>

                        <option disabled>Destinos Internacionais:</option>
                        option>França</option>
                        <option>Japão</option>
                        <option>Itália</option>
                        <option>Austrália</option>
                        <option>Egito</option>
                        <option>Canadá</option>
                        <option>Argentina</option>
                        <option>Alemanha</option>
                        <option>Holanda</option>
                        <option>Grécia</option>
                        <option>Portugal</option>
                        <option>Tailândia</option>
                    </select>
                </div>

                <br>

                <div>
                    <label for="data">Data da viagem</label><br>
                    <input type="date" id="data" required>
                </div>

                <br>

                <div>
                    <label for="pessoas">Quantidade de pessoas</label><br>
                    <input type="number" id="pessoas" placeholder="Ex: 2" required>
                </div>

                <br>

                <div>
                    <label for="mensagem">Mensagem</label>
                    <textarea id="mensagem" placeholder="Digite sua mensagem..." required></textarea>
                </div>

                <br>

                <button type="submit">Enviar</button>
            </form>

            <br>
        </section>
    </main>
    <footer>
        <p>© 2026 TripWay - Todos os direitos reservados</p>
    </footer>
    
</body>
</html>
